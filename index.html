<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Vic ❤️ Yuki</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"></script>

<style>
body {
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  text-align:center;
  background: linear-gradient(135deg,#ffe6f0,#e6f0ff);
  transition:0.3s;
}

header {
  background: linear-gradient(90deg,#ff4d88,#ff99cc);
  color:white;
  padding:15px;
  border-radius:0 0 20px 20px;
}

button {
  padding:10px 15px;
  margin:5px;
  border-radius:20px;
  border:none;
  cursor:pointer;
  background:#ff4d88;
  color:white;
}

.page {display:none;padding:20px;}
.active {display:block;}

.card {
  background:white;
  padding:15px;
  margin:10px;
  border-radius:15px;
  box-shadow:0 4px 10px rgba(0,0,0,0.1);
}

img {
  max-width:90%;
  border-radius:15px;
}

/* LOGIN */
#login {
  position:fixed;
  top:0;left:0;
  width:100%;
  height:100%;
  background:#fff;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
}

/* TEMAS */
.red {background:#ffe6e6;}
.blue {background:#e6f0ff;}
.green {background:#e6ffe6;}
.purple {background:#f3e6ff;}
.dark {background:#222;color:white;}
.light {background:white;color:black;}

</style>
</head>

<body class="red">

<!-- LOGIN -->
<div id="login">
  <h2>Digite a senha ❤️</h2>
  <input type="password" id="senha">
  <button onclick="entrar()">Entrar</button>
</div>

<header>
<h1>Vic ❤️ Yuki</h1>
</header>

<div>
<button onclick="showPage('home')">🏠</button>
<button onclick="showPage('tempo')">⏳</button>
<button onclick="showPage('recados')">💌</button>
<button onclick="showPage('jogo')">🎮</button>
<button onclick="showPage('quiz')">🧠</button>
<button onclick="showPage('chat')">💬</button>
<button onclick="showPage('audio')">🎤</button>
<button onclick="showPage('fotos')">📸</button>
<button onclick="showPage('tema')">🎨</button>
</div>

<!-- HOME -->
<div id="home" class="page active">
<div class="card">
<h2>Nosso cantinho 💕</h2>
<button onclick="mandarAmor()">❤️ Eu te amo</button>
</div>
</div>

<!-- TEMPO -->
<div id="tempo" class="page"><div class="card"><p id="contador"></p></div></div>

<!-- RECADOS -->
<div id="recados" class="page"><div class="card">
<button onclick="novoRecado()">Escrever</button>
<div id="listaRecados"></div>
</div></div>

<!-- JOGO -->
<div id="jogo" class="page"><div class="card">
<button onclick="clicar()">💖 Clique</button>
<p id="placar"></p>
</div></div>

<!-- QUIZ -->
<div id="quiz" class="page"><div class="card">
<button onclick="novaPergunta()">Adicionar pergunta</button>
<p>Pontos: <span id="pontos">0</span></p>
<div id="listaQuiz"></div>
</div></div>

<!-- CHAT -->
<div id="chat" class="page"><div class="card">
<input id="msg">
<button onclick="enviarMsg()">Enviar</button>
<div id="msgs"></div>
</div></div>

<!-- AUDIO -->
<div id="audio" class="page"><div class="card">
<button onclick="gravar()">🎤 Gravar áudio</button>
<div id="audios"></div>
</div></div>

<!-- FOTOS -->
<div id="fotos" class="page"><div class="card">
<button onclick="addFoto()">Adicionar foto</button>
<div id="galeria"></div>
</div></div>

<!-- TEMA -->
<div id="tema" class="page"><div class="card">
<button onclick="setTema('red')">Vermelho</button>
<button onclick="setTema('blue')">Azul</button>
<button onclick="setTema('green')">Verde</button>
<button onclick="setTema('purple')">Roxo</button>
<button onclick="setTema('dark')">Escuro</button>
<button onclick="setTema('light')">Claro</button>
</div></div>

<script>
const firebaseConfig = {
  apiKey:"SUA_API_KEY",
  authDomain:"SEU_DOMINIO",
  databaseURL:"SUA_DATABASE_URL",
  projectId:"SEU_ID"
};

const app = firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* LOGIN */
function entrar(){
  let s = document.getElementById("senha").value;
  if(s==="20102512"){
    document.getElementById("login").style.display="none";
  } else alert("Senha errada");
}

/* NAV */
function showPage(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

/* TEMPO */
const inicio=new Date("2024-01-01");
setInterval(()=>{
let d=Math.floor((new Date()-inicio)/(1000*60*60*24));
contador.innerText=d+" dias 💕";
},1000);

/* AMOR */
function mandarAmor(){db.ref("amor").set("❤️ Eu te amo!");}
db.ref("amor").on("value",s=>{if(s.exists())alert(s.val());});

/* RECADOS */
function novoRecado(){
let t=prompt("Recado:");
if(t)db.ref("recados").push(t);
}
db.ref("recados").on("value",s=>{
listaRecados.innerHTML="";
s.forEach(c=>listaRecados.innerHTML+="<p>"+c.val()+"</p>");
});

/* JOGO */
function clicar(){db.ref("clicks").transaction(n=>(n||0)+1);}
db.ref("clicks").on("value",s=>placar.innerText="Cliques: "+s.val());

/* QUIZ */
let pontos=0;
function novaPergunta(){
let p=prompt("Pergunta:");
let r=prompt("Resposta:");
if(p&&r)db.ref("quiz").push({p,r});
}
db.ref("quiz").on("value",s=>{
listaQuiz.innerHTML="";
s.forEach(c=>{
let q=c.val();
listaQuiz.innerHTML+=`
<p>${q.p}</p>
<button onclick="resp('${q.r}')">Responder</button>`;
});
});
function resp(r){
let u=prompt("Resposta:");
if(u==r){pontos++;alert("Acertou ❤️");}
else alert("Errou 😢");
document.getElementById("pontos").innerText=pontos;
}

/* CHAT */
function enviarMsg(){
let m=msg.value;
if(m)db.ref("chat").push(m);
msg.value="";
}
db.ref("chat").on("value",s=>{
msgs.innerHTML="";
s.forEach(c=>msgs.innerHTML+="<p>"+c.val()+"</p>");
});

/* AUDIO */
let mediaRecorder;
async function gravar(){
let stream=await navigator.mediaDevices.getUserMedia({audio:true});
mediaRecorder=new MediaRecorder(stream);
let chunks=[];
mediaRecorder.ondataavailable=e=>chunks.push(e.data);
mediaRecorder.onstop=e=>{
let blob=new Blob(chunks);
let url=URL.createObjectURL(blob);
db.ref("audios").push(url);
};
mediaRecorder.start();
setTimeout(()=>mediaRecorder.stop(),3000);
}

db.ref("audios").on("value",s=>{
audios.innerHTML="";
s.forEach(c=>{
audios.innerHTML+=`<audio controls src="${c.val()}"></audio>`;
});
});

/* FOTOS */
function addFoto(){
let u=prompt("Link:");
if(u)db.ref("fotos").push(u);
}
db.ref("fotos").on("value",s=>{
galeria.innerHTML="";
s.forEach(c=>galeria.innerHTML+=`<img src="${c.val()}">`);
});

/* TEMAS */
function setTema(t){document.body.className=t;}
</script>

</body>
</html>
